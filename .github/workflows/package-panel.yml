name: Package panel

on:
  workflow_dispatch:
  push:
    branches:
      - cloud
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/centralcorp/centralpanel-v2
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=sha
            type=raw,value=cloud,enable=${{ github.ref == 'refs/heads/cloud' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  package:
    name: Build production ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Create temporary environment
        run: cp .env.example .env

      - name: Determine package version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            BASE_VERSION="$(tr -d '\r\n' < VERSION)"
            BASE_VERSION="${BASE_VERSION#v}"
            VERSION="${BASE_VERSION}-dev.${GITHUB_SHA::7}"
          fi

          echo "PANEL_VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "ZIP_NAME=panel-v${VERSION}.zip" >> "${GITHUB_ENV}"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: bcmath, ctype, curl, fileinfo, mbstring, openssl, pdo, pdo_sqlite, tokenizer, xml, xmlwriter, zip
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --ansi --no-interaction --no-progress --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Build panel ZIP
        run: php artisan build:prod --panel-version="${PANEL_VERSION}" --commit="${GITHUB_SHA}" --output="${RUNNER_TEMP}/${ZIP_NAME}"

      - name: Generate checksum
        shell: bash
        run: |
          cd "${RUNNER_TEMP}"
          sha256sum "${ZIP_NAME}" > "${ZIP_NAME}.sha256"

      - name: Upload CI artifact
        uses: actions/upload-artifact@v7
        with:
          name: ci-package-${{ env.PANEL_VERSION }}
          path: |
            ${{ runner.temp }}/${{ env.ZIP_NAME }}
            ${{ runner.temp }}/${{ env.ZIP_NAME }}.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Add package summary
        shell: bash
        run: |
          {
            echo "### Package generated"
            echo ""
            echo "- Version: \`${PANEL_VERSION}\`"
            echo "- Installable ZIP: \`${ZIP_NAME}\`"
            echo "- CI artifacts are wrapped by GitHub Actions. Extract the artifact first, then use the ZIP inside."
            echo "- For a real release/update package, push a tag like \`v1.0.9\`; the ZIP will be attached directly to the GitHub Release."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Attach ZIP to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ runner.temp }}/${{ env.ZIP_NAME }}
            ${{ runner.temp }}/${{ env.ZIP_NAME }}.sha256
