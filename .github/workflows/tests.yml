name: CentralCorp CI

on:
  push:
  pull_request:

jobs:
  tests:
    name: PHP and CentralCloud Docker contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: bcmath, curl, mbstring, pdo, pdo_pgsql, pdo_sqlite, xml, xmlwriter, zip
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install --ansi --no-interaction --no-progress --prefer-dist

      - name: Run PHP tests
        run: composer test

      - name: Build container image
        run: docker build -t centralpanel-cloud:agent-test .

      - name: Validate CentralCloud runtime contract
        run: composer test:docker

  assets:
    name: Bundle assets

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run production
